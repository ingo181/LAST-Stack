networks:
  last-net:
    driver: bridge

volumes:
  surreal-primary-data:
  surreal-replica-data:
  kafka-data:
  cargo-cache:
  cargo-registry:
  cargo-git:
  cargo-target:

services:

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: last-kafka
    restart: unless-stopped
    networks: [last-net]
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: last-kafka-init
    networks: [last-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic user.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic order.events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic notifications --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic auth.events --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic dead.letter --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: on-failure

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: last-kafka-ui
    restart: unless-stopped
    networks: [last-net]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: last-stack
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  surreal-primary:
    image: surrealdb/surrealdb:latest
    container_name: last-surreal-primary
    restart: unless-stopped
    networks: [last-net]
    ports:
      - "8000:8000"
    volumes:
      - surreal-primary-data:/mydata
    user: "${UID:-1000}:${GID:-1000}"
    command:
      - start
      - --log=info
      - --user=${SURREAL_USER:-root}
      - --pass=${SURREAL_PASS:-root}
      - rocksdb:/mydata/primary.db
    environment:
      SURREAL_CAPS_ALLOW_ALL: "true"

  surreal-replica:
    image: surrealdb/surrealdb:latest
    container_name: last-surreal-replica
    restart: unless-stopped
    networks: [last-net]
    ports:
      - "8001:8000"
    volumes:
      - surreal-replica-data:/mydata
    user: "${UID:-1000}:${GID:-1000}"
    command:
      - start
      - --log=info
      - --user=${SURREAL_USER:-root}
      - --pass=${SURREAL_PASS:-root}
      - rocksdb:/mydata/replica.db

  surrealist:
    image: surrealdb/surrealist:latest
    container_name: last-surrealist
    restart: unless-stopped
    networks: [last-net]
    ports:
      - "8080:8080"
    depends_on:
      - surreal-primary

  # ── Dev Container ────────────────────────────────────────────
  # Wird von devcontainer.json als "service" referenziert.
  # Läuft nur während der Entwicklung — nicht in Produktion.
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: last-dev
    restart: "no"
    networks: [last-net]
    volumes:
      # Workspace — live gemountet
      - .:/workspace:cached
      # Cargo Registry Cache — überlebt Container-Neustarts
      - cargo-registry:/home/dev/.cargo/registry
      - cargo-git:/home/dev/.cargo/git
      # Target Cache — verhindert Neu-Kompilierung bei jedem Start
      - cargo-target:/workspace/target
    environment:
      SURREAL_URL:  ws://surreal-primary:8000
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASS: ${SURREAL_PASS:-root}
      SURREAL_NS:   opcaq
      APQP_PORT:    "8081"
      RUST_LOG:     "apqp_service=debug,tower_http=info"
      KAFKA_BROKERS: last-kafka:29092
    ports:
      - "3000:3000"   # trunk (Leptos frontend)
      - "8081:8081"   # apqp-service
    depends_on:
      - surreal-primary
      - kafka
    command: sleep infinity
